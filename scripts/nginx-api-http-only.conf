# HTTP solo: desafío ACME antes de tener certificado TLS.
# Copiar a: /etc/nginx/sites-available/ y enlazar en sites-enabled.
# Certbot: certbot certonly --webroot -w /var/www/letsencrypt -d api.publivalla.com

server {
    listen 80;
    server_name api.publivalla.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
