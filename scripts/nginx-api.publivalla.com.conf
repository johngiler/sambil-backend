##
## api.publivalla.com — Sambil API (Django + Gunicorn)
## Copiar en el servidor: /etc/nginx/sites-available/api.publivalla.com.conf
## sudo ln -sf /etc/nginx/sites-available/api.publivalla.com.conf /etc/nginx/sites-enabled/
##

server {
    listen 80;
    server_name api.publivalla.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.publivalla.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /home/git/backend/staticfiles/;
    }

    location /media/ {
        alias /home/git/backend/media/;
    }

    ssl_certificate /etc/letsencrypt/live/api.publivalla.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.publivalla.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
}
